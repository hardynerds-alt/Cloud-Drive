<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Server Storage</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Theme variables (dark = default) ───────────────────────── */
:root {
  --bg:          #0d0d0d;
  --fg:          #f2f2f2;
  --border:      #262626;
  --card:        #141414;
  --card-fg:     #f2f2f2;
  --sidebar:     #141414;
  --sidebar-border: #262626;
  --primary:     #3db05f;
  --primary-dark:#2e9e50;
  --primary-fg:  #ffffff;
  --muted:       #1f1f1f;
  --muted-fg:    #8c8c8c;
  --accent:      #1f1f1f;
  --accent-fg:   #f2f2f2;
  --input:       #1f1f1f;
  --input-border:#333333;
  --destructive: #7d1919;
  --destr-fg:    #f2f2f2;
  --row-hover:   rgba(255,255,255,.04);
  --overlay:     rgba(0,0,0,.65);
}
.light {
  --bg:          #f5f8fd;
  --fg:          #0a0f1a;
  --border:      #dde3ef;
  --card:        #ffffff;
  --card-fg:     #0a0f1a;
  --sidebar:     #eef2f9;
  --sidebar-border: #dde3ef;
  --primary:     #2e9e50;
  --primary-dark:#267840;
  --primary-fg:  #ffffff;
  --muted:       #eef2f9;
  --muted-fg:    #6b7280;
  --accent:      #eef2f9;
  --accent-fg:   #0a0f1a;
  --input:       #ffffff;
  --input-border:#dde3ef;
  --destructive: #dc2626;
  --destr-fg:    #f5f8fd;
  --row-hover:   rgba(0,0,0,.03);
  --overlay:     rgba(0,0,0,.5);
}

/* ── Base ───────────────────────────────────────────────────── */
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--fg);
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.5;
}
a { color: inherit; text-decoration: none; }
button { cursor: pointer; font-family: inherit; font-size: 14px; }

/* ── Buttons ────────────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 8px 14px; border: none; border-radius: 6px;
  font-size: 13px; font-weight: 500; cursor: pointer;
  white-space: nowrap; transition: opacity .15s, background .15s;
}
.btn:disabled { opacity: .45; cursor: not-allowed; }
.btn-primary { background: var(--primary); color: var(--primary-fg); }
.btn-primary:hover:not(:disabled) { background: var(--primary-dark); }
.btn-secondary { background: var(--muted); color: var(--fg); border: 1px solid var(--border); }
.btn-secondary:hover:not(:disabled) { background: var(--accent); }
.btn-ghost { background: transparent; color: var(--muted-fg); border: 1px solid transparent; }
.btn-ghost:hover:not(:disabled) { background: var(--muted); color: var(--fg); }
.btn-icon { padding: 7px; border-radius: 6px; background: transparent; color: var(--muted-fg); border: 1px solid transparent; }
.btn-icon:hover { background: var(--muted); color: var(--fg); }
.btn-icon.active { background: var(--muted); color: var(--fg); }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn-full { width: 100%; }
.btn-danger { background: var(--destructive); color: var(--destr-fg); }
.btn-danger:hover:not(:disabled) { opacity: .85; }

/* ── Form elements ──────────────────────────────────────────── */
input[type="text"], input[type="password"], input[type="search"], input[type="date"] {
  background: var(--input); color: var(--fg); border: 1px solid var(--input-border);
  border-radius: 6px; padding: 8px 12px; font-size: 14px; width: 100%; outline: none;
  font-family: inherit;
}
input:focus { border-color: var(--primary); }
input[type="search"]::-webkit-search-cancel-button { display: none; }

/* ── Error message ──────────────────────────────────────────── */
.error-msg {
  background: rgba(220,38,38,.12); border: 1px solid rgba(220,38,38,.4);
  color: #f87171; padding: 9px 14px; border-radius: 6px;
  font-size: 13px; display: none; margin-bottom: 12px;
}

/* ────────────────────────────────────────────────────────────── */
/*  LOGIN PAGE                                                    */
/* ────────────────────────────────────────────────────────────── */
#pg-login {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; background: var(--bg); padding: 16px; position: relative;
}
.login-theme-btn {
  position: absolute; top: 16px; right: 16px;
  background: transparent; border: 1px solid var(--border);
  color: var(--muted-fg); border-radius: 6px; padding: 6px 12px;
  font-size: 13px; display: flex; align-items: center; gap: 6px;
}
.login-theme-btn:hover { color: var(--fg); background: var(--muted); }
.login-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 36px 32px;
  width: 100%; max-width: 400px;
  box-shadow: 0 4px 32px rgba(0,0,0,.35);
}
.login-header { text-align: center; margin-bottom: 28px; }
.login-icon {
  width: 64px; height: 64px; background: rgba(61,176,95,.12);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  margin: 0 auto 16px;
}
.login-icon svg { color: var(--primary); }
.login-header h1 { font-size: 22px; font-weight: 700; letter-spacing: -.02em; }
.login-header p { color: var(--muted-fg); font-size: 13px; margin-top: 6px; }
.login-field { margin-bottom: 20px; }
.login-field input { height: 44px; }

/* ────────────────────────────────────────────────────────────── */
/*  APP SHELL                                                     */
/* ────────────────────────────────────────────────────────────── */
#pg-app {
  display: none; min-height: 100vh;
  flex-direction: column;
}
@media (min-width: 1024px) {
  #pg-app { flex-direction: row; }
}

/* ── Sidebar ────────────────────────────────────────────────── */
#sidebar {
  background: var(--sidebar); border-bottom: 1px solid var(--sidebar-border);
  flex-shrink: 0; display: flex; flex-direction: column;
  padding: 12px 16px;
}
@media (min-width: 1024px) {
  #sidebar {
    width: 240px; border-bottom: none;
    border-right: 1px solid var(--sidebar-border);
    padding: 20px 16px;
  }
}

.sidebar-top {
  display: flex; align-items: center;
  justify-content: space-between; gap: 8px;
}
.sidebar-logo {
  display: flex; align-items: center; gap: 10px;
  font-size: 16px; font-weight: 700; color: var(--primary);
  cursor: pointer;
}
.sidebar-logo svg { flex-shrink: 0; }

.sidebar-theme-btn {
  background: transparent; border: 1px solid var(--border);
  color: var(--muted-fg); border-radius: 6px; padding: 5px 9px;
  font-size: 12px; display: flex; align-items: center; gap: 5px;
}
.sidebar-theme-btn:hover { color: var(--fg); background: var(--accent); }

.sidebar-nav {
  display: flex; flex-direction: row; margin-top: 0; gap: 4px;
}
@media (min-width: 1024px) {
  .sidebar-top { margin-bottom: 20px; }
  .sidebar-nav { flex-direction: column; margin-top: 0; }
}

.nav-link {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 10px; border-radius: 6px; font-size: 13px; font-weight: 500;
  color: var(--muted-fg); cursor: pointer;
}
.nav-link:hover { background: var(--accent); color: var(--fg); }
.nav-link.active { background: var(--accent); color: var(--fg); }
.nav-link svg { flex-shrink: 0; }

/* Mobile: sidebar is horizontal top strip */
@media (max-width: 1023px) {
  #sidebar { flex-direction: row; align-items: center; flex-wrap: wrap; gap: 8px; }
  .sidebar-top { flex: 1; }
  .sidebar-nav { margin-top: 0; }
}

/* ── Main content ───────────────────────────────────────────── */
#main-area { flex: 1; min-width: 0; display: flex; flex-direction: column; }

/* ────────────────────────────────────────────────────────────── */
/*  FILES VIEW                                                    */
/* ────────────────────────────────────────────────────────────── */
#view-files { flex: 1; display: flex; flex-direction: column; padding: 20px; }
@media (min-width: 768px) { #view-files { padding: 24px 28px; } }

/* Toolbar */
.toolbar-row {
  display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px;
}
@media (min-width: 640px) {
  .toolbar-row { flex-direction: row; align-items: center; justify-content: space-between; }
}

/* Breadcrumbs */
.breadcrumbs {
  display: flex; align-items: center; flex-wrap: wrap; gap: 2px;
  font-size: 13px; overflow: hidden;
}
.bc-item {
  display: flex; align-items: center; gap: 4px;
  color: var(--muted-fg); cursor: pointer; padding: 3px 6px; border-radius: 5px;
}
.bc-item:hover { background: var(--accent); color: var(--fg); }
.bc-item.current { color: var(--fg); font-weight: 600; cursor: default; }
.bc-item.current:hover { background: transparent; }
.bc-sep { color: var(--muted-fg); font-size: 12px; }

/* Toolbar right */
.toolbar-actions {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
}
.search-wrap { position: relative; }
.search-wrap svg { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--muted-fg); }
.search-wrap input { padding-left: 32px; width: 220px; height: 34px; font-size: 13px; }
@media (max-width: 479px) { .search-wrap input { width: 140px; } }

.view-toggle {
  display: flex; border: 1px solid var(--border); border-radius: 6px; overflow: hidden;
}
.view-toggle button {
  background: transparent; border: none; color: var(--muted-fg);
  padding: 6px 9px; display: flex; align-items: center;
}
.view-toggle button.active { background: var(--muted); color: var(--fg); }
.view-toggle button:first-child { border-right: 1px solid var(--border); }

/* Dropdown */
.dropdown { position: relative; }
.dropdown-menu {
  position: absolute; right: 0; top: calc(100% + 4px);
  background: var(--card); border: 1px solid var(--border);
  border-radius: 8px; min-width: 180px; z-index: 200;
  box-shadow: 0 8px 24px rgba(0,0,0,.3); display: none; overflow: hidden;
}
.dropdown-menu.open { display: block; }
.dropdown-label {
  padding: 8px 12px 4px; font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: .06em; color: var(--muted-fg);
}
.dropdown-sep { border-bottom: 1px solid var(--border); margin: 4px 0; }
.dropdown-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 12px; font-size: 13px; cursor: pointer; color: var(--fg);
  width: 100%; background: none; border: none; text-align: left;
}
.dropdown-item:hover { background: var(--accent); }
.dropdown-item.active { color: var(--primary); }
.dropdown-item.danger:hover { background: rgba(220,38,38,.1); color: #f87171; }
.dropdown-radio { display: flex; align-items: center; gap: 10px; }
.dropdown-radio-dot {
  width: 14px; height: 14px; border-radius: 50%;
  border: 2px solid var(--border); flex-shrink: 0;
}
.dropdown-item.active .dropdown-radio-dot { border-color: var(--primary); background: var(--primary); }

/* Drop zone */
#drop-overlay {
  position: absolute; inset: 0; z-index: 50;
  background: rgba(61,176,95,.08);
  border: 3px dashed var(--primary);
  border-radius: 10px; margin: 12px;
  display: none; flex-direction: column;
  align-items: center; justify-content: center; gap: 12px;
  color: var(--primary); font-weight: 700; font-size: 18px;
}
#drop-overlay svg { opacity: .7; }

/* File table (list view) */
.file-table-wrap {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; overflow: hidden;
}
.file-table { width: 100%; border-collapse: collapse; }
.file-table th {
  padding: 10px 14px; font-size: 12px; font-weight: 600;
  text-transform: uppercase; letter-spacing: .05em; color: var(--muted-fg);
  border-bottom: 1px solid var(--border); text-align: left;
  background: var(--card); white-space: nowrap;
}
.file-table td { padding: 9px 14px; border-bottom: 1px solid rgba(255,255,255,.04); vertical-align: middle; }
.light .file-table td { border-bottom: 1px solid rgba(0,0,0,.04); }
.file-table tr:last-child td { border-bottom: none; }
.file-table tr:hover td { background: var(--row-hover); }
.file-table .col-name { width: 99%; }
.file-table .col-date, .file-table .col-size, .file-table .col-actions {
  white-space: nowrap; color: var(--muted-fg); font-size: 13px;
}
.file-table .col-size { text-align: right; }
.file-table .col-actions { text-align: right; }
@media (max-width: 639px) { .col-date { display: none; } }
@media (max-width: 479px) { .col-size { display: none; } }

.file-name-cell { display: flex; align-items: center; gap: 10px; }
.file-name-text {
  cursor: pointer; font-weight: 500; overflow: hidden;
  text-overflow: ellipsis; white-space: nowrap;
  max-width: 35vw;
}
.file-name-text:hover { color: var(--primary); }
@media (min-width: 640px) { .file-name-text { max-width: 260px; } }
@media (min-width: 1024px) { .file-name-text { max-width: 380px; } }

/* Row actions */
.row-actions { display: flex; align-items: center; justify-content: flex-end; }
.row-menu-btn {
  background: none; border: none; color: var(--muted-fg);
  padding: 4px 6px; border-radius: 5px; opacity: 0;
}
tr:hover .row-menu-btn, .row-menu-btn:focus { opacity: 1; }
.row-menu-btn:hover { background: var(--muted); color: var(--fg); }

/* File grid */
.file-grid {
  display: flex; flex-wrap: wrap; gap: 14px;
}
.grid-item {
  width: calc(50% - 7px);
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; padding: 16px 12px; cursor: pointer;
  position: relative; overflow: hidden;
  display: flex; flex-direction: column; align-items: center; gap: 10px;
}
@media (min-width: 480px) { .grid-item { width: calc(33.33% - 10px); } }
@media (min-width: 768px) { .grid-item { width: calc(25% - 11px); } }
@media (min-width: 1024px) { .grid-item { width: calc(20% - 12px); } }
@media (min-width: 1280px) { .grid-item { width: calc(16.66% - 12px); } }
.grid-item:hover { border-color: var(--primary); background: var(--row-hover); }
.grid-item-icon { height: 64px; display: flex; align-items: center; justify-content: center; }
.grid-item-name {
  font-size: 12px; font-weight: 500; text-align: center;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; width: 100%;
}
.grid-item-size { font-size: 11px; color: var(--muted-fg); }
.grid-item-menu {
  position: absolute; top: 6px; right: 6px; opacity: 0;
}
.grid-item:hover .grid-item-menu { opacity: 1; }

/* Empty state */
.empty-state {
  text-align: center; padding: 64px 20px; color: var(--muted-fg);
}
.empty-icon {
  width: 64px; height: 64px; background: var(--muted);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  margin: 0 auto 16px;
}
.empty-state h3 { font-size: 16px; font-weight: 500; color: var(--fg); margin-bottom: 6px; }
.empty-state p { font-size: 13px; }

/* Upload progress */
#upload-toast {
  position: fixed; bottom: 20px; right: 20px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; padding: 16px 18px; min-width: 260px;
  box-shadow: 0 8px 32px rgba(0,0,0,.35); display: none; z-index: 300;
}
#upload-toast h4 { font-size: 13px; font-weight: 600; margin-bottom: 10px; }
.upload-file-item { margin-bottom: 8px; }
.upload-file-name { font-size: 12px; color: var(--muted-fg); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.prog-bar-bg { background: var(--muted); border-radius: 4px; height: 6px; }
.prog-bar-fill { background: var(--primary); height: 100%; border-radius: 4px; transition: width .1s; }
.upload-done { color: var(--primary); font-size: 12px; }
.upload-err { color: #f87171; font-size: 12px; }
.upload-toast-close {
  position: absolute; top: 10px; right: 10px;
  background: none; border: none; color: var(--muted-fg); padding: 2px;
}
.upload-toast-close:hover { color: var(--fg); }

/* ────────────────────────────────────────────────────────────── */
/*  STATS VIEW                                                    */
/* ────────────────────────────────────────────────────────────── */
#view-stats { display: none; padding: 24px 28px; max-width: 900px; margin: 0 auto; width: 100%; }

.back-link {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 13px; color: var(--muted-fg); cursor: pointer; margin-bottom: 16px;
}
.back-link:hover { color: var(--fg); }

.stats-header { margin-bottom: 28px; }
.stats-header h1 { font-size: 26px; font-weight: 700; letter-spacing: -.02em; margin-bottom: 4px; }
.stats-header p { color: var(--muted-fg); font-size: 14px; }

.stats-cards { display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 28px; }
.stat-card {
  flex: 1; min-width: 200px;
  background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 20px;
}
.stat-card-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.stat-card-header span { font-size: 12px; font-weight: 600; color: var(--muted-fg); text-transform: uppercase; letter-spacing: .05em; }
.stat-card-header svg { color: var(--muted-fg); }
.stat-card-value { font-size: 28px; font-weight: 700; }

.stats-table-card {
  background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden;
}
.stats-table-header { padding: 16px 18px; border-bottom: 1px solid var(--border); }
.stats-table-header h3 { font-size: 15px; font-weight: 600; }
.stats-table { width: 100%; border-collapse: collapse; }
.stats-table th {
  padding: 9px 14px; font-size: 12px; font-weight: 600;
  color: var(--muted-fg); text-transform: uppercase; letter-spacing: .04em;
  border-bottom: 1px solid var(--border); text-align: left;
}
.stats-table th:last-child { text-align: right; }
.stats-table td { padding: 9px 14px; border-bottom: 1px solid rgba(255,255,255,.04); font-size: 13px; }
.light .stats-table td { border-bottom: 1px solid rgba(0,0,0,.04); }
.stats-table tr:last-child td { border-bottom: none; }
.stats-table .td-muted { color: var(--muted-fg); }
.stats-table .td-right { text-align: right; }

/* Loading spinner */
.spinner {
  display: inline-block; width: 28px; height: 28px;
  border: 3px solid var(--muted); border-top-color: var(--primary);
  border-radius: 50%; animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-state { display: flex; align-items: center; justify-content: center; padding: 60px; }

/* ────────────────────────────────────────────────────────────── */
/*  MODALS                                                        */
/* ────────────────────────────────────────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0; background: var(--overlay);
  display: none; align-items: center; justify-content: center;
  z-index: 400; padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 24px; width: 100%; max-width: 440px;
  box-shadow: 0 20px 60px rgba(0,0,0,.5); max-height: 90vh; overflow-y: auto;
}
.modal-lg { max-width: 680px; }
.modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
.modal-label { font-size: 13px; font-weight: 500; display: block; margin-bottom: 6px; color: var(--muted-fg); }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
.modal-field { margin-bottom: 14px; }

/* Preview */
#preview-content { text-align: center; margin-bottom: 16px; }
#preview-content img { max-width: 100%; max-height: 65vh; border-radius: 8px; object-fit: contain; }
#preview-content video { max-width: 100%; max-height: 65vh; border-radius: 8px; }
#preview-content iframe { width: 100%; height: 60vh; border: none; border-radius: 8px; }
.no-preview-msg { padding: 40px; color: var(--muted-fg); font-size: 14px; }

/* Share URL */
.share-url-row { display: flex; gap: 8px; }
.share-url-row input { flex: 1; font-size: 12px; background: var(--muted); color: var(--muted-fg); }

/* Toast notification */
#toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: #1a1a1a; color: #fff; padding: 10px 18px;
  border-radius: 8px; font-size: 13px; z-index: 500;
  opacity: 0; transition: opacity .2s; pointer-events: none; white-space: nowrap;
}
.light #toast { background: #1e293b; }
#toast.show { opacity: 1; }
#toast.error { background: #7d1919; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 3px; }

/* Utility */
.hidden { display: none !important; }
.w-full { width: 100%; }
.relative { position: relative; }
</style>
</head>

    <path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/>
  </symbol>
  <symbol id="ic-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

<script>
'use strict';

/* ── State ──────────────────────────────────────────────────── */
var currentPath = '/';
var currentView = 'list';
var sortField   = 'name';
var sortOrder   = 'asc';
var searchQuery = '';
var isDark      = true;
var allItems    = [];

var renameTarget = null;
var deleteTarget = null;
var shareTarget  = null;
var moveTarget   = null;

var searchTimer = null;
var dragCounter = 0;

/* ── SVG helper ─────────────────────────────────────────────── */
function ic(id, size) {
  size = size || 16;
  return '<svg width="' + size + '" height="' + size + '"><use href="#' + id + '"/></svg>';
}

/* ── Theme ──────────────────────────────────────────────────── */
function applyTheme() {
  if (isDark) {
    document.documentElement.classList.remove('light');
  } else {
    document.documentElement.classList.add('light');
  }
  var loginBtn = document.getElementById('login-theme-btn');
  var sideBtn  = document.getElementById('sidebar-theme-btn');
  if (isDark) {
    if (loginBtn) loginBtn.innerHTML = ic('ic-sun', 14) + '<span>Light Mode</span>';
    if (sideBtn)  sideBtn.innerHTML  = ic('ic-sun', 13) + '<span>Light</span>';
  } else {
    if (loginBtn) loginBtn.innerHTML = ic('ic-moon', 14) + '<span>Dark Mode</span>';
    if (sideBtn)  sideBtn.innerHTML  = ic('ic-moon', 13) + '<span>Dark</span>';
  }
}

function toggleTheme() {
  isDark = !isDark;
  try { localStorage.setItem('theme', isDark ? 'dark' : 'light'); } catch(e){}
  applyTheme();
}

function loadTheme() {
  try {
    var saved = localStorage.getItem('theme');
    if (saved === 'light') isDark = false;
  } catch(e){}
  applyTheme();
}

/* ── Utilities ──────────────────────────────────────────────── */
function fmtSize(bytes) {
  if (bytes === 0) return '0 B';
  var units = ['B', 'KB', 'MB', 'GB', 'TB'];
  var i = Math.floor(Math.log(bytes) / Math.log(1024));
  return (bytes / Math.pow(1024, i)).toFixed(1) + ' ' + units[i];
}

function fmtDate(iso) {
  if (!iso) return '';
  var d = new Date(iso);
  return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}

var toastTimer = null;
function showToast(msg, isError) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = isError ? 'show error' : 'show';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { el.className = ''; }, 3000);
}

/* ── Auth ───────────────────────────────────────────────────── */
function init() {
  loadTheme();
  fetch('/api/auth/me')
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.authenticated) { showApp(); loadFiles(currentPath); }
      else showLogin();
    })
    .catch(function() { showLogin(); });
}

function showLogin() {
  document.getElementById('pg-login').style.display = 'flex';
  document.getElementById('pg-app').style.display   = 'none';
}
function showApp() {
  document.getElementById('pg-login').style.display   = 'none';
  document.getElementById('pg-app').style.display     = 'flex';
  document.getElementById('view-files').style.display = 'block';
  document.getElementById('view-stats').style.display = 'none';
  setupDragDrop();
}

document.getElementById('login-form').addEventListener('submit', function(e) {
  e.preventDefault();
  var pw   = document.getElementById('password-input').value;
  var errEl = document.getElementById('login-error');
  var btn  = document.getElementById('login-btn');
  errEl.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Signing in…';

  fetch('/api/auth/login', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({password: pw})
  })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.authenticated) { showApp(); loadFiles('/'); }
      else {
        errEl.textContent = d.error || 'Login failed';
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Access Server';
      }
    })
    .catch(function() {
      errEl.textContent = 'Network error';
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Access Server';
    });
});

function logout() {
  fetch('/api/auth/logout', {method:'POST'}).then(function() { showLogin(); });
}

/* ── Navigation ─────────────────────────────────────────────── */
function showFiles() {
  document.getElementById('view-files').style.display = 'block';
  document.getElementById('view-stats').style.display = 'none';
  document.getElementById('nav-stats').classList.remove('active');
}

function showStats() {
  document.getElementById('view-files').style.display = 'none';
  document.getElementById('view-stats').style.display = 'block';
  document.getElementById('nav-stats').classList.add('active');
  loadStats();
}

/* ── File loading ───────────────────────────────────────────── */
function loadFiles(dirPath) {
  currentPath = dirPath || '/';
  var url = '/api/files?path=' + encodeURIComponent(currentPath);
  if (sortField) url += '&sort=' + sortField;
  if (sortOrder) url += '&order=' + sortOrder;
  if (searchQuery) url += '&search=' + encodeURIComponent(searchQuery);

  document.getElementById('file-content').innerHTML =
    '<div class="loading-state"><div class="spinner"></div></div>';

  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.error) { showToast(d.error, true); return; }
      allItems = d.items || [];
      renderBreadcrumbs(d.breadcrumbs || []);
      renderFileContent();
    })
    .catch(function() { showToast('Failed to load files', true); });
}

/* ── Breadcrumbs ────────────────────────────────────────────── */
function renderBreadcrumbs(crumbs) {
  var el = document.getElementById('breadcrumbs');
  var html = '';
  // Home
  html += '<span class="bc-item" onclick="loadFiles(\'/\')">' + ic('ic-home', 14) + ' Server</span>';
  for (var i = 0; i < crumbs.length; i++) {
    var c = crumbs[i];
    html += '<span class="bc-sep">' + ic('ic-chevron-right', 13) + '</span>';
    if (i === crumbs.length - 1) {
      html += '<span class="bc-item current">' + esc(c.name) + '</span>';
    } else {
      html += '<span class="bc-item" data-path="' + esc(c.path) + '" onclick="loadFiles(this.dataset.path)">' + esc(c.name) + '</span>';
    }
  }
  el.innerHTML = html;
}

/* ── File content rendering ─────────────────────────────────── */
function renderFileContent() {
  var items = sortItems(allItems.slice());
  var el = document.getElementById('file-content');

  if (items.length === 0) {
    el.innerHTML = renderEmptyState();
    return;
  }

  if (currentView === 'grid') {
    el.innerHTML = renderGrid(items);
  } else {
    el.innerHTML = renderList(items);
  }
}

function renderEmptyState() {
  return '<div class="empty-state">' +
    '<div class="empty-icon">' + ic('ic-upload', 28) + '</div>' +
    '<h3>This folder is empty</h3>' +
    '<p>Drag and drop files here, or use the upload button.</p>' +
    '</div>';
}

/* ── List view ──────────────────────────────────────────────── */
function renderList(items) {
  var html = '<div class="file-table-wrap"><table class="file-table">' +
    '<thead><tr>' +
    '<th class="col-name">Name</th>' +
    '<th class="col-date">Date modified</th>' +
    '<th class="col-size">Size</th>' +
    '<th class="col-actions"></th>' +
    '</tr></thead>' +
    '<tbody>';

  for (var i = 0; i < items.length; i++) {
    html += renderListRow(items[i]);
  }
  html += '</tbody></table></div>';
  return html;
}

function renderListRow(item) {
  var iconId = getIconId(item);
  var iconColor = getIconColor(item);
  var clickAttr = item.type === 'folder'
    ? 'onclick="loadFiles(\'' + esc(item.path) + '\')"'
    : isPreviewable(item) ? 'onclick="openPreview(' + JSON.stringify(item) + ')"' : '';

  return '<tr>' +
    '<td class="col-name">' +
      '<div class="file-name-cell">' +
        '<svg width="18" height="18" style="color:' + iconColor + '; flex-shrink:0"><use href="#' + iconId + '"/></svg>' +
        '<span class="file-name-text" ' + clickAttr + ' title="' + esc(item.name) + '">' + esc(item.name) + '</span>' +
      '</div>' +
    '</td>' +
    '<td class="col-date">' + fmtDate(item.modifiedAt) + '</td>' +
    '<td class="col-size">' + (item.type === 'folder' ? '\u2014' : fmtSize(item.size)) + '</td>' +
    '<td class="col-actions"><div class="row-actions"><div class="dropdown" id="row-dd-' + esc(item.path) + '">' +
      '<button class="row-menu-btn" onclick="event.stopPropagation(); toggleDropdown(\'row-dd-' + esc(item.path) + '\')">' +
        ic('ic-more', 15) +
      '</button>' +
      renderContextMenu(item, 'right') +
    '</div></div></td>' +
    '</tr>';
}

/* ── Grid view ──────────────────────────────────────────────── */
function renderGrid(items) {
  var html = '<div class="file-grid">';
  for (var i = 0; i < items.length; i++) {
    html += renderGridItem(items[i]);
  }
  html += '</div>';
  return html;
}

function renderGridItem(item) {
  var iconId = getIconId(item);
  var iconColor = getIconColor(item);
  var iconSize = item.type === 'folder' ? 48 : 40;
  var clickAttr = item.type === 'folder'
    ? 'onclick="loadFiles(\'' + esc(item.path) + '\')"'
    : isPreviewable(item) ? 'onclick="openPreview(' + JSON.stringify(item) + ')"' : '';

  return '<div class="grid-item" ' + clickAttr + '>' +
    '<div class="grid-item-menu" onclick="event.stopPropagation();">' +
      '<div class="dropdown" id="grid-dd-' + esc(item.path) + '">' +
        '<button class="btn-icon btn-sm" onclick="toggleDropdown(\'grid-dd-' + esc(item.path) + '\')">' +
          ic('ic-more', 14) +
        '</button>' +
        renderContextMenu(item, 'right') +
      '</div>' +
    '</div>' +
    '<div class="grid-item-icon">' +
      '<svg width="' + iconSize + '" height="' + iconSize + '" style="color:' + iconColor + '"><use href="#' + iconId + '"/></svg>' +
    '</div>' +
    '<div class="grid-item-name" title="' + esc(item.name) + '">' + esc(item.name) + '</div>' +
    '<div class="grid-item-size">' + (item.type === 'folder' ? 'Folder' : fmtSize(item.size)) + '</div>' +
    '</div>';
}

/* ── Context menu ───────────────────────────────────────────── */
function renderContextMenu(item, align) {
  var isFile = item.type === 'file';
  var canPreview = isPreviewable(item);
  var html = '<div class="dropdown-menu" id="menu-' + esc(item.path) + '">';

  if (canPreview) {
    html += '<button class="dropdown-item" onclick="openPreview(' + JSON.stringify(item) + '); closeAllDropdowns();">' +
      ic('ic-eye', 14) + ' Preview</button>';
  }
  if (isFile) {
    html += '<button class="dropdown-item" onclick="downloadFile(\'' + esc(item.path) + '\', \'' + esc(item.name) + '\'); closeAllDropdowns();">' +
      ic('ic-download', 14) + ' Download</button>';
    html += '<button class="dropdown-item" onclick="openShareModal(' + JSON.stringify(item) + '); closeAllDropdowns();">' +
      ic('ic-share', 14) + ' Share</button>';
  }
  html += '<div class="dropdown-sep"></div>';
  html += '<button class="dropdown-item" onclick="openRenameModal(' + JSON.stringify(item) + '); closeAllDropdowns();">' +
    ic('ic-edit', 14) + ' Rename</button>';
  html += '<button class="dropdown-item" onclick="openMoveModal(' + JSON.stringify(item) + '); closeAllDropdowns();">' +
    ic('ic-move', 14) + ' Move</button>';
  html += '<div class="dropdown-sep"></div>';
  html += '<button class="dropdown-item danger" onclick="openDeleteModal(' + JSON.stringify(item) + '); closeAllDropdowns();">' +
    ic('ic-trash', 14) + ' Delete</button>';
  html += '</div>';
  return html;
}

/* ── Icon helpers ───────────────────────────────────────────── */
function getIconId(item) {
  if (item.type === 'folder') return 'ic-folder';
  var ext = (item.name.split('.').pop() || '').toLowerCase();
  var mime = item.mimeType || '';
  if (mime.indexOf('image/') === 0 || ['jpg','jpeg','png','gif','webp','svg','bmp'].indexOf(ext) !== -1) return 'ic-image';
  if (mime.indexOf('video/') === 0 || ['mp4','webm','mkv','avi','mov'].indexOf(ext) !== -1) return 'ic-video';
  if (mime === 'application/pdf' || ext === 'pdf') return 'ic-pdf';
  return 'ic-file-t';
}

function getIconColor(item) {
  if (item.type === 'folder') return '#60a5fa';
  var ext = (item.name.split('.').pop() || '').toLowerCase();
  var mime = item.mimeType || '';
  if (mime.indexOf('image/') === 0 || ['jpg','jpeg','png','gif','webp','svg','bmp'].indexOf(ext) !== -1) return '#4ade80';
  if (mime.indexOf('video/') === 0 || ['mp4','webm','mkv','avi','mov'].indexOf(ext) !== -1) return '#a78bfa';
  if (mime === 'application/pdf' || ext === 'pdf') return '#f87171';
  return 'var(--muted-fg)';
}

function isPreviewable(item) {
  if (item.type === 'folder') return false;
  var ext = (item.name.split('.').pop() || '').toLowerCase();
  var mime = item.mimeType || '';
  return mime.indexOf('image/') === 0 || mime.indexOf('video/') === 0 ||
    mime === 'application/pdf' ||
    ['jpg','jpeg','png','gif','webp','mp4','webm','pdf'].indexOf(ext) !== -1;
}

/* ── Sort ───────────────────────────────────────────────────── */
function sortItems(items) {
  return items.sort(function(a, b) {
    if (a.type !== b.type) return a.type === 'folder' ? -1 : 1;
    var cmp = 0;
    if (sortField === 'size')      cmp = a.size - b.size;
    else if (sortField === 'date') cmp = new Date(a.modifiedAt) - new Date(b.modifiedAt);
    else                           cmp = a.name.localeCompare(b.name);
    return sortOrder === 'desc' ? -cmp : cmp;
  });
}

function setSort(field) {
  sortField = field;
  updateSortUI();
  loadFiles(currentPath);
  closeAllDropdowns();
}
function setOrder(ord) {
  sortOrder = ord;
  updateSortUI();
  loadFiles(currentPath);
  closeAllDropdowns();
}
function updateSortUI() {
  var fields = ['name','date','size'];
  for (var i = 0; i < fields.length; i++) {
    var el = document.getElementById('s-' + fields[i]);
    if (el) el.className = 'dropdown-item' + (sortField === fields[i] ? ' active' : '');
  }
  var ordEl1 = document.getElementById('o-asc');
  var ordEl2 = document.getElementById('o-desc');
  if (ordEl1) ordEl1.className = 'dropdown-item' + (sortOrder === 'asc' ? ' active' : '');
  if (ordEl2) ordEl2.className = 'dropdown-item' + (sortOrder === 'desc' ? ' active' : '');
}

/* ── View ───────────────────────────────────────────────────── */
function setView(mode) {
  currentView = mode;
  document.getElementById('btn-list-view').className = mode === 'list' ? 'active' : '';
  document.getElementById('btn-grid-view').className = mode === 'grid' ? 'active' : '';
  renderFileContent();
}

/* ── Search ─────────────────────────────────────────────────── */
function onSearch(val) {
  searchQuery = val;
  clearTimeout(searchTimer);
  searchTimer = setTimeout(function() { loadFiles(currentPath); }, 300);
}

/* ── Dropdowns ──────────────────────────────────────────────── */
function toggleDropdown(id) {
  var menu = document.getElementById(id + '-menu') || document.querySelector('#' + id + ' .dropdown-menu');
  if (!menu) {
    // for row/grid dropdowns the menu is a sibling child
    var container = document.getElementById(id);
    if (container) menu = container.querySelector('.dropdown-menu');
  }
  if (!menu) return;
  var isOpen = menu.classList.contains('open');
  closeAllDropdowns();
  if (!isOpen) menu.classList.add('open');
}

function closeAllDropdowns() {
  var menus = document.querySelectorAll('.dropdown-menu.open');
  for (var i = 0; i < menus.length; i++) menus[i].classList.remove('open');
}

document.addEventListener('click', function(e) {
  if (!e.target.closest('.dropdown')) closeAllDropdowns();
});

/* ── Upload ─────────────────────────────────────────────────── */
function handleFileInput(input) {
  if (!input.files || input.files.length === 0) return;
  uploadFiles(input.files);
  input.value = '';
}

function uploadFiles(files) {
  var fileArr = Array.from(files);
  if (fileArr.length === 0) return;

  var toast = document.getElementById('upload-toast');
  var list  = document.getElementById('upload-list');
  toast.style.display = 'block';

  fileArr.forEach(function(file) {
    var id = 'up-' + Math.random().toString(36).slice(2);
    var div = document.createElement('div');
    div.className = 'upload-file-item';
    div.id = id;
    div.innerHTML = '<div class="upload-file-name">' + esc(file.name) + '</div>' +
      '<div class="prog-bar-bg"><div class="prog-bar-fill" style="width:0%" id="' + id + '-bar"></div></div>';
    list.appendChild(div);

    var xhr = new XMLHttpRequest();
    var fd  = new FormData();
    fd.append('files', file);

    xhr.upload.addEventListener('progress', function(ev) {
      if (!ev.lengthComputable) return;
      var pct = Math.round((ev.loaded / ev.total) * 100);
      var bar = document.getElementById(id + '-bar');
      if (bar) bar.style.width = pct + '%';
    });

    xhr.addEventListener('load', function() {
      var item = document.getElementById(id);
      if (!item) return;
      if (xhr.status >= 200 && xhr.status < 300) {
        item.innerHTML = '<div class="upload-done">' + ic('ic-check', 13) + ' ' + esc(file.name) + '</div>';
        loadFiles(currentPath);
      } else {
        item.innerHTML = '<div class="upload-err">' + ic('ic-x', 13) + ' Failed: ' + esc(file.name) + '</div>';
      }
    });

    xhr.addEventListener('error', function() {
      var item = document.getElementById(id);
      if (item) item.innerHTML = '<div class="upload-err">' + ic('ic-x', 13) + ' Error: ' + esc(file.name) + '</div>';
    });

    xhr.open('POST', '/api/upload?path=' + encodeURIComponent(currentPath));
    xhr.send(fd);
  });
}

function closeUploadToast() {
  document.getElementById('upload-toast').style.display = 'none';
  document.getElementById('upload-list').innerHTML = '';
}

/* ── Drag & drop ────────────────────────────────────────────── */
function setupDragDrop() {
  var area = document.getElementById('view-files');
  var overlay = document.getElementById('drop-overlay');

  area.addEventListener('dragenter', function(e) {
    e.preventDefault();
    dragCounter++;
    if (dragCounter === 1) overlay.style.display = 'flex';
  });
  area.addEventListener('dragleave', function(e) {
    e.preventDefault();
    dragCounter--;
    if (dragCounter <= 0) { dragCounter = 0; overlay.style.display = 'none'; }
  });
  area.addEventListener('dragover', function(e) { e.preventDefault(); });
  area.addEventListener('drop', function(e) {
    e.preventDefault();
    dragCounter = 0;
    overlay.style.display = 'none';
    if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
      uploadFiles(e.dataTransfer.files);
    }
  });

  document.getElementById('drop-label').textContent = 'Drop files to upload to Server';
}

/* ── Download ───────────────────────────────────────────────── */
function downloadFile(filePath, fileName) {
  var a = document.createElement('a');
  a.href = '/api/download?path=' + encodeURIComponent(filePath);
  a.download = fileName;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

/* ── Delete ─────────────────────────────────────────────────── */
function openDeleteModal(item) {
  deleteTarget = item;
  document.getElementById('delete-msg').textContent =
    'Delete "' + item.name + '"' +
    (item.type === 'folder' ? ' and all its contents?' : '?') +
    ' This cannot be undone.';
  openModal('modal-delete');
}

function confirmDelete() {
  if (!deleteTarget) return;
  fetch('/api/file?path=' + encodeURIComponent(deleteTarget.path), {method:'DELETE'})
    .then(function(r) { return r.json(); })
    .then(function(d) {
      closeModal('modal-delete');
      if (d.success) { showToast(deleteTarget.name + ' deleted'); loadFiles(currentPath); }
      else showToast(d.error || 'Delete failed', true);
      deleteTarget = null;
    })
    .catch(function() { showToast('Delete failed', true); });
}

/* ── Rename ─────────────────────────────────────────────────── */
function openRenameModal(item) {
  renameTarget = item;
  var inp = document.getElementById('rename-input');
  inp.value = item.name;
  openModal('modal-rename');
  setTimeout(function() { inp.focus(); inp.select(); }, 60);
}

function confirmRename() {
  if (!renameTarget) return;
  var newName = document.getElementById('rename-input').value.trim();
  if (!newName) return;
  var dir = renameTarget.path.substring(0, renameTarget.path.lastIndexOf('/') + 1);
  var toPath = dir + newName;
  fetch('/api/file', {
    method:'PATCH',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({from: renameTarget.path, to: toPath})
  })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      closeModal('modal-rename');
      if (d.success) { showToast('Renamed to ' + newName); loadFiles(currentPath); }
      else showToast(d.error || 'Rename failed', true);
      renameTarget = null;
    })
    .catch(function() { showToast('Rename failed', true); });
}

document.getElementById('rename-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') confirmRename();
  if (e.key === 'Escape') closeModal('modal-rename');
});

/* ── Move ───────────────────────────────────────────────────── */
function openMoveModal(item) {
  moveTarget = item;
  var dir = item.path.substring(0, item.path.lastIndexOf('/') + 1);
  var inp = document.getElementById('move-dest-input');
  inp.value = dir;
  openModal('modal-move');
  setTimeout(function() { inp.focus(); }, 60);
}

function confirmMove() {
  if (!moveTarget) return;
  var dest = document.getElementById('move-dest-input').value.trim();
  if (!dest) return;
  if (dest[dest.length - 1] !== '/') dest += '/';
  var toPath = dest + moveTarget.name;
  fetch('/api/file', {
    method:'PATCH',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({from: moveTarget.path, to: toPath})
  })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      closeModal('modal-move');
      if (d.success) { showToast('Moved successfully'); loadFiles(currentPath); }
      else showToast(d.error || 'Move failed', true);
      moveTarget = null;
    })
    .catch(function() { showToast('Move failed', true); });
}

/* ── New folder ─────────────────────────────────────────────── */
function openFolderModal() {
  document.getElementById('folder-name-input').value = '';
  openModal('modal-folder');
  setTimeout(function() { document.getElementById('folder-name-input').focus(); }, 60);
}

function confirmNewFolder() {
  var name = document.getElementById('folder-name-input').value.trim();
  if (!name) return;
  var fp = (currentPath === '/' ? '' : currentPath) + '/' + name;
  fetch('/api/folders', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({path: fp})
  })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      closeModal('modal-folder');
      if (d.success) { showToast('Folder created'); loadFiles(currentPath); }
      else showToast(d.error || 'Failed', true);
    })
    .catch(function() { showToast('Failed', true); });
}

document.getElementById('folder-name-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') confirmNewFolder();
  if (e.key === 'Escape') closeModal('modal-folder');
});

/* ── Share ──────────────────────────────────────────────────── */
function openShareModal(item) {
  shareTarget = item;
  document.getElementById('share-expires-input').value = '';
  document.getElementById('share-result').className = 'hidden modal-field';
  document.getElementById('share-gen-btn').style.display = '';
  document.getElementById('share-gen-btn').disabled = false;
  openModal('modal-share');
}

function generateShare() {
  if (!shareTarget) return;
  var expires = document.getElementById('share-expires-input').value || null;
  var btn = document.getElementById('share-gen-btn');
  btn.disabled = true;
  fetch('/api/share', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({path: shareTarget.path, expiresAt: expires})
  })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      btn.disabled = false;
      if (d.url) {
        document.getElementById('share-url-input').value = d.url;
        document.getElementById('share-result').className = 'modal-field';
        btn.style.display = 'none';
      } else {
        showToast(d.error || 'Share failed', true);
      }
    })
    .catch(function() { btn.disabled = false; showToast('Share failed', true); });
}

function copyShareUrl() {
  var inp = document.getElementById('share-url-input');
  inp.select();
  try { document.execCommand('copy'); showToast('Link copied!'); }
  catch(e) { showToast('Select and copy manually'); }
}

/* ── Preview ────────────────────────────────────────────────── */
function openPreview(item) {
  var ext  = (item.name.split('.').pop() || '').toLowerCase();
  var purl = '/api/preview?path=' + encodeURIComponent(item.path);
  var durl = '/api/download?path=' + encodeURIComponent(item.path);

  document.getElementById('preview-title').textContent = item.name;
  var dlBtn = document.getElementById('preview-dl-btn');
  dlBtn.href = durl;
  dlBtn.download = item.name;

  var content = document.getElementById('preview-content');
  content.innerHTML = '';

  var imgs   = ['jpg','jpeg','png','gif','webp','bmp','svg'];
  var videos = ['mp4','webm'];

  if (imgs.indexOf(ext) !== -1) {
    var img = document.createElement('img');
    img.src = purl;
    img.alt = item.name;
    content.appendChild(img);
  } else if (videos.indexOf(ext) !== -1) {
    var vid = document.createElement('video');
    vid.src = purl;
    vid.controls = true;
    content.appendChild(vid);
  } else if (ext === 'pdf') {
    var frame = document.createElement('iframe');
    frame.src = purl;
    frame.title = item.name;
    content.appendChild(frame);
  } else {
    var msg = document.createElement('div');
    msg.className = 'no-preview-msg';
    msg.textContent = 'No preview available for this file type.';
    content.appendChild(msg);
  }
  openModal('modal-preview');
}

function handlePreviewBgClick(e) {
  if (e.target === document.getElementById('modal-preview')) {
    closeModal('modal-preview');
    document.getElementById('preview-content').innerHTML = '';
  }
}

/* ── Stats ──────────────────────────────────────────────────── */
function loadStats() {
  var el = document.getElementById('stats-content');
  el.innerHTML = '<div class="loading-state"><div class="spinner"></div></div>';

  fetch('/api/storage/stats')
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.error) { el.innerHTML = '<p style="color:var(--muted-fg)">Failed to load stats</p>'; return; }
      el.innerHTML = renderStats(d);
    })
    .catch(function() {
      el.innerHTML = '<p style="color:var(--muted-fg)">Failed to load stats</p>';
    });
}

function renderStats(d) {
  var html = '<div class="stats-cards">' +
    statCard('Total Usage', fmtSize(d.totalSize), 'ic-drive') +
    statCard('Files', (d.totalFiles || 0).toLocaleString(), 'ic-file-t') +
    statCard('Folders', (d.totalFolders || 0).toLocaleString(), 'ic-folder') +
    '</div>';

  html += '<div class="stats-table-card">' +
    '<div class="stats-table-header"><h3>Large Files</h3></div>' +
    '<table class="stats-table"><thead><tr>' +
    '<th>Name</th><th>Path</th><th>Size</th>' +
    '</tr></thead><tbody>';

  var files = d.largestFiles || [];
  if (files.length === 0) {
    html += '<tr><td colspan="3" style="text-align:center; padding:24px; color:var(--muted-fg)">No files found.</td></tr>';
  } else {
    for (var i = 0; i < files.length; i++) {
      var f = files[i];
      html += '<tr>' +
        '<td style="font-weight:500">' + esc(f.name) + '</td>' +
        '<td class="td-muted">' + esc(f.path) + '</td>' +
        '<td class="td-right">' + fmtSize(f.size) + '</td>' +
        '</tr>';
    }
  }
  html += '</tbody></table></div>';
  return html;
}

function statCard(label, value, iconId) {
  return '<div class="stat-card">' +
    '<div class="stat-card-header">' +
      '<span>' + label + '</span>' +
      '<svg width="16" height="16"><use href="#' + iconId + '"/></svg>' +
    '</div>' +
    '<div class="stat-card-value">' + value + '</div>' +
    '</div>';
}

/* ── Modals ─────────────────────────────────────────────────── */
function openModal(id) {
  document.getElementById(id).classList.add('open');
}
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  if (id === 'modal-preview') {
    document.getElementById('preview-content').innerHTML = '';
  }
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    var open = document.querySelector('.modal-overlay.open');
    if (open) closeModal(open.id);
  }
});

/* ── Escape HTML ────────────────────────────────────────────── */
function esc(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

/* ── Init ───────────────────────────────────────────────────── */
updateSortUI();
init();
</script>
</body>
</html>
